name: LandingPattern
options:
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
packages:
  LandingPatternCore:
    path: ./LandingPatternCore
targets:
  LandingPattern:
    type: application
    platform: iOS
    sources:
      - path: LandingPattern
        excludes:
          - Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nickgao.landingpattern
        PRODUCT_NAME: LandingPattern
        INFOPLIST_FILE: LandingPattern/Resources/Info.plist
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 0.1.0
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: NO
    dependencies:
      - package: LandingPatternCore
        product: LandingPatternCore

schemes:
  LandingPattern:
    build:
      targets:
        LandingPattern: all
    run:
      config: Debug
    archive:
      config: Release
